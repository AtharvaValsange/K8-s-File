apiVersion: apps/v1
kind: Deployment

metadata:
  name: atharva-deployment
  labels:
    first: app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: web

  template:
    metadata:
      labels:
        app: web

    spec:
      containers:
      - name: atharva-container

        image: atharva7823/fitnesstracker:v1

        ports:
        - containerPort: 5000